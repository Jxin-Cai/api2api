name: Deploy production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
      REPOSITORY_URL: https://github.com/${{ github.repository }}.git

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      ADMIN_USERNAME: ${{ vars.ADMIN_USERNAME }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
      SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}

      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      PROVIDER_SECRET_ENV: ${{ secrets.PROVIDER_SECRET_ENV }}

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077

          require_value() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "Required value $name is empty" >&2
              exit 1
            fi
          }

          require_value DEPLOY_HOST "$DEPLOY_HOST"
          require_value DEPLOY_USER "$DEPLOY_USER"
          require_value DEPLOY_PORT "$DEPLOY_PORT"
          require_value DEPLOY_PATH "$DEPLOY_PATH"
          require_value DEPLOY_BRANCH "$DEPLOY_BRANCH"
          require_value DEPLOY_SSH_PRIVATE_KEY "$DEPLOY_SSH_PRIVATE_KEY"
          require_value SSH_KNOWN_HOSTS "$SSH_KNOWN_HOSTS"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts

      - name: Render production env file
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077

          env_file="$RUNNER_TEMP/api2api.env"
          : > "$env_file"
          chmod 600 "$env_file"

          dotenv_line() {
            local key="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "Required env value for $key is empty" >&2
              exit 1
            fi

            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              echo "Value for $key must be single-line" >&2
              exit 1
            fi

            value="${value//\'/\'\\\'\'}"
            printf "%s='%s'\n" "$key" "$value" >> "$env_file"
          }

          dotenv_line POSTGRES_DB "$POSTGRES_DB"
          dotenv_line POSTGRES_USER "$POSTGRES_USER"
          dotenv_line POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
          dotenv_line ADMIN_USERNAME "$ADMIN_USERNAME"
          dotenv_line ADMIN_PASSWORD "$ADMIN_PASSWORD"
          dotenv_line FRONTEND_PORT "$FRONTEND_PORT"
          dotenv_line COMPOSE_PROJECT_NAME "${COMPOSE_PROJECT_NAME:-api2api}"

          if [[ "$ADMIN_PASSWORD" == "change-me" ]]; then
            echo "ADMIN_PASSWORD must not be change-me" >&2
            exit 1
          fi

          if [[ -n "${PROVIDER_SECRET_ENV:-}" ]]; then
            while IFS= read -r line || [[ -n "$line" ]]; do
              line="${line%$'\r'}"
              [[ -z "$line" ]] && continue
              [[ "$line" =~ ^[[:space:]]*# ]] && continue

              if [[ ! "$line" =~ ^[A-Z_][A-Z0-9_]*= ]]; then
                echo "Invalid provider secret env line name" >&2
                exit 1
              fi

              printf '%s\n' "$line" >> "$env_file"
            done <<< "$PROVIDER_SECRET_ENV"
          fi

      - name: Prepare remote repository
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh_args=(
            -i ~/.ssh/deploy_key
            -p "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          ssh "${ssh_args[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -se -- "$DEPLOY_PATH" "$DEPLOY_BRANCH" "$REPOSITORY_URL" <<'REMOTE'
          set -Eeuo pipefail

          deploy_path="$1"
          deploy_branch="$2"
          repository_url="$3"

          if [[ ! -d "$deploy_path/.git" ]]; then
            mkdir -p "$(dirname "$deploy_path")"

            if [[ -e "$deploy_path" ]] && find "$deploy_path" -mindepth 1 -maxdepth 1 | grep -q .; then
              echo "$deploy_path exists but is not an empty git repository" >&2
              exit 1
            fi

            git clone --branch "$deploy_branch" "$repository_url" "$deploy_path"
          fi
          REMOTE

      - name: Upload env file
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh_args=(
            -i ~/.ssh/deploy_key
            -p "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          ssh "${ssh_args[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -c 'set -Eeuo pipefail
          deploy_path="$1"
          umask 077
          mkdir -p "$deploy_path"
          cat > "$deploy_path/.env.next"
          chmod 600 "$deploy_path/.env.next"
          mv "$deploy_path/.env.next" "$deploy_path/.env"' \
            _ "$DEPLOY_PATH" < "$RUNNER_TEMP/api2api.env"

      - name: Deploy on server
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh_args=(
            -i ~/.ssh/deploy_key
            -p "$DEPLOY_PORT"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          ssh "${ssh_args[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -se -- "$DEPLOY_PATH" "$DEPLOY_BRANCH" "${COMPOSE_PROJECT_NAME:-api2api}" <<'REMOTE'
          set -Eeuo pipefail

          deploy_path="$1"
          deploy_branch="$2"
          compose_project_name="$3"

          cd "$deploy_path"

          if command -v flock >/dev/null 2>&1; then
            exec 9>/var/lock/api2api-deploy.lock
            flock -n 9
          fi

          test -s .env

          git fetch --prune origin "$deploy_branch"
          git checkout -B "$deploy_branch" "origin/$deploy_branch"
          git reset --hard "origin/$deploy_branch"

          docker compose --env-file .env -p "$compose_project_name" config --quiet
          docker compose --env-file .env -p "$compose_project_name" up -d --build --remove-orphans
          docker compose --env-file .env -p "$compose_project_name" ps
          REMOTE
