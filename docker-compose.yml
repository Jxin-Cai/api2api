services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api2api}
      POSTGRES_USER: ${POSTGRES_USER:-api2api}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api2api}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - shared-backend

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-api2api}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-api2api}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-api2api}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    networks:
      - shared-backend

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8989}:80"
    networks:
      - shared-backend

volumes:
  postgres-data:

networks:
  shared-backend:
    name: shared-backend-network
