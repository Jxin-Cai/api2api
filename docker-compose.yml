services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: api2api
      POSTGRES_USER: api2api
      POSTGRES_PASSWORD: api2api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api2api -d api2api"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/api2api
      SPRING_DATASOURCE_USERNAME: api2api
      SPRING_DATASOURCE_PASSWORD: api2api
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
