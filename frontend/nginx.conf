server {
  listen 80;
  server_name _;

  # Claude Code requests can exceed Nginx's 1 MiB default once conversation
  # history and tool schemas are included. Keep the gateway aligned with the
  # 256 MiB request limit used by sub2api so valid Messages payloads reach the
  # protocol conversion layer instead of being rejected with HTTP 413.
  client_max_body_size 256m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/ {
    proxy_pass http://backend:8080/v1/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 1200s;
    proxy_send_timeout 1200s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
