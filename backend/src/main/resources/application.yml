spring:
  application:
    name: api2api
  mvc:
    async:
      request-timeout: ${API2API_GATEWAY_ASYNC_TIMEOUT:15m}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/api2api}
    username: ${SPRING_DATASOURCE_USERNAME:api2api}
    password: ${SPRING_DATASOURCE_PASSWORD:api2api}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      timeout: ${API2API_LOGIN_SESSION_TIMEOUT:30d}
      cookie:
        max-age: ${API2API_LOGIN_COOKIE_MAX_AGE:30d}
        http-only: true
        same-site: lax

api2api:
  bootstrap-admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
  security:
    api-key-material:
      encryption-key: ${API2API_API_KEY_ENCRYPTION_KEY:api2api-development-api-key-material-secret}
      key-version: 1
  provider-http:
    connect-timeout: 2s
    models-read-timeout: 30s
    models-max-retries: 1
    upstream-host-override: ${API2API_UPSTREAM_HOST_OVERRIDE:${APP_UPSTREAM_HOST_OVERRIDE:}}
    allow-insecure-hosts: ${API2API_PROVIDER_HTTP_ALLOW_INSECURE_HOSTS:true}
    upstream-read-timeout: ${API2API_UPSTREAM_READ_TIMEOUT:10m}
    streaming-first-byte-timeout: ${API2API_STREAMING_FIRST_BYTE_TIMEOUT:2m}
    streaming-idle-timeout: ${API2API_STREAMING_IDLE_TIMEOUT:10m}
    streaming-max-retries: ${API2API_STREAMING_MAX_RETRIES:2}
    streaming-retry-backoff: ${API2API_STREAMING_RETRY_BACKOFF:200ms}
  provider-secrets:
    keys: {}
